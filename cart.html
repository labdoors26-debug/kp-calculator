<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ — Invisible Doors Loft</title>
<style>
:root{
    --black:#1a1a1a;
    --white:#fff;
    --gray-bg:#f5f4f2;
    --gray-border:#e0ded9;
    --gray-text:#777;
    --red:#e53935;
    --blue:#1565c0;
    --green:#2e7d32;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Segoe UI',Arial,sans-serif;font-size:14px;background:var(--gray-bg);color:var(--black);min-height:100%;}
body{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;}

.erp-hdr{
    background:var(--black);color:#fff;padding:14px 24px;
    display:flex;align-items:center;gap:14px;
    position:sticky;top:0;z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.erp-hdr h1{font-size:16px;font-weight:700;flex:1;}
.sa-badge{font-size:11px;background:var(--blue);padding:4px 12px;border-radius:20px;}

.container{
    max-width:1280px;margin:24px auto;padding:0 20px;
}

.card{
    background:#fff;border-radius:10px;
    box-shadow:0 2px 14px rgba(0,0,0,.06);
    padding:24px;margin-bottom:20px;
}

.order-title{
    font-size:24px;font-weight:700;margin-bottom:18px;
}

.fields-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
    margin-bottom:6px;
}
@media(max-width:900px){.fields-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.fields-grid{grid-template-columns:1fr;}}

.field{
    position:relative;
}
.field label{
    position:absolute;top:-8px;left:10px;
    font-size:11px;background:#fff;padding:0 5px;
    color:var(--gray-text);z-index:1;white-space:nowrap;
}
.field input,.field select,.field textarea{
    width:100%;
    padding:11px 10px 8px;
    border:1px solid #ccc;border-radius:7px;
    font-size:13px;font-family:inherit;
    background:#fff;outline:none;
    transition:border-color .15s;
}
.field textarea{min-height:60px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--black);}

h2.section-title{
    font-size:20px;font-weight:700;margin:28px 0 12px;
}

.items-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;border-radius:8px;overflow:hidden;
}
.items-table thead th{
    background:#fafafa;
    font-size:12px;font-weight:600;color:#555;
    text-align:left;
    padding:12px 14px;
    border-bottom:1px solid var(--gray-border);
    text-transform:none;
}
.items-table thead th.col-num{width:48px;text-align:center;}
.items-table thead th.col-price{width:120px;text-align:right;}
.items-table thead th.col-count{width:90px;text-align:center;}
.items-table thead th.col-disc{width:80px;text-align:center;}
.items-table thead th.col-sum{width:130px;text-align:right;}
.items-table thead th.col-actions{width:100px;text-align:right;}

.items-table tbody td{
    padding:14px;
    border-bottom:1px solid var(--gray-border);
    font-size:13px;
    vertical-align:top;
}
.items-table tbody tr:last-child td{border-bottom:none;}
.items-table tbody tr:hover{background:#fafafa;}

.col-num{text-align:center;color:var(--gray-text);}
.col-price,.col-sum{text-align:right;font-variant-numeric:tabular-nums;}
.col-count{text-align:center;}
.col-disc{text-align:center;}
.col-actions{text-align:right;white-space:nowrap;}

.item-name{font-weight:600;line-height:1.4;margin-bottom:4px;}
.item-desc{font-size:12px;color:#666;line-height:1.5;}
.item-desc-block{margin-top:3px;}
.item-desc-block b{color:#444;font-weight:600;}

.cnt-input{
    width:60px;padding:6px;text-align:center;
    border:1px solid #ccc;border-radius:6px;
    font-size:13px;font-family:inherit;
}
.disc-input{
    width:60px;padding:6px;text-align:center;
    border:1px solid #ccc;border-radius:6px;
    font-size:13px;font-family:inherit;
}

.icon-btn{
    width:34px;height:34px;
    border:1px solid var(--gray-border);
    background:#fff;border-radius:6px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:15px;transition:all .15s;
    margin-left:4px;
}
.icon-btn:hover{background:#f0f0f0;border-color:#bbb;}
.icon-btn.danger:hover{background:#ffebee;border-color:var(--red);color:var(--red);}

.empty-row{text-align:center;color:var(--gray-text);padding:40px 14px;font-size:13px;}

.add-row{
    width:100%;padding:18px;
    background:#fff;border:2px dashed var(--gray-border);
    border-radius:8px;
    font-size:14px;font-weight:600;color:#444;
    cursor:pointer;margin-top:12px;
    transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
}
.add-row:hover{background:#f5f5f5;border-color:#aaa;color:var(--black);}

.totals-block{
    margin-top:24px;
    display:grid;grid-template-columns:1fr 380px;gap:24px;
    align-items:start;
}
@media(max-width:700px){.totals-block{grid-template-columns:1fr;}}

.totals-card{
    background:#fafafa;border-radius:8px;padding:18px 22px;
}
.tot-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-bottom:1px dashed #ddd;
    font-size:14px;
}
.tot-row:last-of-type{border-bottom:none;}
.tot-row.final{
    font-size:20px;font-weight:700;
    padding-top:14px;margin-top:6px;border-top:2px solid var(--black);
    border-bottom:none;
}
.tot-label{color:#555;}
.tot-row.final .tot-label{color:var(--black);}
.tot-value{font-variant-numeric:tabular-nums;font-weight:600;}

.btn{
    display:inline-flex;align-items:center;justify-content:center;
    padding:12px 22px;border:1.5px solid transparent;border-radius:8px;
    cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;
    transition:opacity .15s,background .15s;
    text-decoration:none;
}
.btn:hover{opacity:.88;}
.btn-dark{background:var(--black);color:#fff;border-color:var(--black);}
.btn-out{background:#fff;color:var(--black);border-color:var(--gray-border);}
.btn-out:hover{background:#f5f5f5;}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);}

.actions-bar{
    display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;
    margin-top:20px;padding-top:18px;border-top:1px solid var(--gray-border);
}

.discount-wrap{position:relative;display:inline-block;}
.discount-wrap::after{
    content:'%';position:absolute;right:8px;top:50%;
    transform:translateY(-50%);color:#999;pointer-events:none;
}
.discount-wrap .disc-input{padding-right:22px;}

.toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--black);color:#fff;
    padding:12px 24px;border-radius:8px;
    font-size:13px;font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
    z-index:9999;
    transition:opacity .3s;
}

.field-row-checkbox{
    display:flex;align-items:center;gap:8px;margin-top:6px;
    font-size:13px;color:#444;
}
.field-row-checkbox input{width:auto;}
</style>
</head>
<body>
<div class="erp-hdr">
    <h1>📋 Заказ — Invisible Doors Loft</h1>
    <span class="sa-badge">КОРЗИНА</span>
</div>

<main>
<div class="container">

    <!-- Шапка заказа -->
    <div class="card">
        <div class="order-title" id="orderTitle">Новый заказ</div>

        <div class="fields-grid">
            <div class="field">
                <label for="contact">Контакт: Физическое лицо</label>
                <input type="text" id="contact" placeholder="ФИО или название" />
            </div>
            <div class="field">
                <label for="organization">Организация</label>
                <input type="text" id="organization" placeholder="ООО / ИП" />
            </div>
            <div class="field">
                <label for="srok">Срок (дней)</label>
                <input type="number" id="srok" min="1" value="5" />
            </div>
            <div class="field">
                <label for="shipDate">Планируемая дата отгрузки</label>
                <input type="date" id="shipDate" />
            </div>
            <div class="field">
                <label for="note">Примечание</label>
                <textarea id="note" placeholder="Комментарий менеджера..."></textarea>
            </div>
            <div class="field">
                <label for="prodNote">Примечание производству</label>
                <textarea id="prodNote" placeholder="Технические детали для цеха..."></textarea>
            </div>
        </div>
    </div>

    <!-- Товары заказа -->
    <div class="card">
        <h2 class="section-title">Товары заказа</h2>

        <table class="items-table">
            <thead>
                <tr>
                    <th class="col-num">#</th>
                    <th>Наименование</th>
                    <th class="col-price">Цена</th>
                    <th class="col-count">Кол-во</th>
                    <th class="col-disc">Скидка</th>
                    <th class="col-sum">Сумма</th>
                    <th class="col-actions"></th>
                </tr>
            </thead>
            <tbody id="itemsBody">
                <!-- сюда рендерятся позиции -->
            </tbody>
        </table>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">
            <button type="button" class="add-row" style="flex:1;min-width:240px" onclick="addNewDoor()">
                <span style="font-size:18px;">🚪</span> ＋ Новая дверь
            </button>
            <button type="button" class="add-row" style="flex:1;min-width:240px" onclick="addNewPartition()">
                <span style="font-size:18px;">🪟</span> ＋ Новая перегородка
            </button>
        </div>

        <!-- Итоги -->
        <div class="totals-block">
            <div>
                <div class="field" style="max-width:300px;">
                    <label for="comment">Комментарий</label>
                    <textarea id="comment" rows="3" placeholder="Любая дополнительная информация..."></textarea>
                </div>
                <div class="field-row-checkbox">
                    <input type="checkbox" id="ndsToggle" />
                    <label for="ndsToggle" style="position:static;background:none;padding:0;font-size:13px;">Включить НДС 22% в итоговую сумму</label>
                </div>
            </div>

            <div class="totals-card">
                <div class="tot-row">
                    <span class="tot-label">Подытог:</span>
                    <span class="tot-value" id="subTotal">0 ₽</span>
                </div>
                <div class="tot-row">
                    <span class="tot-label">
                        Общая скидка:
                        <span class="discount-wrap" style="margin-left:6px;">
                            <input type="number" class="disc-input" id="orderDiscount" min="0" max="100" value="0" />
                        </span>
                    </span>
                    <span class="tot-value" id="discountValue">−0 ₽</span>
                </div>
                <div class="tot-row" id="ndsRow" style="display:none;">
                    <span class="tot-label">НДС 22%:</span>
                    <span class="tot-value" id="ndsValue">0 ₽</span>
                </div>
                <div class="tot-row final">
                    <span class="tot-label">Итого:</span>
                    <span class="tot-value" id="grandTotal">0 ₽</span>
                </div>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="actions-bar">
            <button type="button" class="btn btn-out" onclick="closeOrder()">Закрыть</button>
            <button type="button" class="btn btn-red" onclick="clearOrder()">Очистить заказ</button>
            <button type="button" class="btn btn-dark" onclick="saveOrder()">Сохранить</button>
            <button type="button" class="btn btn-blue" onclick="sendToErp()">Отправить в МС →</button>
        </div>
    </div>

</div>
</main>

<script>
// ========== Утилиты ==========
function formatRub(value) {
    var n = parseFloat(value) || 0;
    return Math.round(n).toLocaleString('ru-RU') + ' ₽';
}

function showToast(msg, color) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    if (color) t.style.background = color;
    document.body.appendChild(t);
    setTimeout(function(){
        t.style.opacity = '0';
        setTimeout(function(){ if (t.parentNode) t.parentNode.removeChild(t); }, 350);
    }, 2500);
}

// ========== Хранилище ==========
var STORE_KEY = 'doorCart';
var META_KEY = 'doorCartMeta';

function loadCart() {
    try {
        var raw = sessionStorage.getItem(STORE_KEY);
        var arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
}

function saveCart(arr) {
    try { sessionStorage.setItem(STORE_KEY, JSON.stringify(arr)); } catch(e){}
}

function loadMeta() {
    try {
        var raw = sessionStorage.getItem(META_KEY);
        return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
}

function saveMeta(m) {
    try { sessionStorage.setItem(META_KEY, JSON.stringify(m)); } catch(e){}
}

// ========== Рендер таблицы ==========
function renderItems() {
    var cart = loadCart();
    var tbody = document.getElementById('itemsBody');

    if (cart.length === 0) {
        tbody.innerHTML = '<tr><td class="empty-row" colspan="7">В заказе пока нет позиций. Добавьте дверь или перегородку.</td></tr>';
        recalc();
        return;
    }

    var rows = cart.map(function(item, idx) {
        var pricePerOne = item.totalPrice || 0;
        var qty = item.count || 1;
        var disc = item.discount || 0;
        var sumLine = Math.round(pricePerOne * qty * (100 - disc) / 100);

        var descParts = [];
        if (item.sideOne && item.sideOne !== 'Параметры не заполнены') descParts.push('<div class="item-desc-block"><b>Створка 1:</b> ' + escapeHtml(item.sideOne) + '</div>');
        if (item.sideTwo && item.sideTwo !== 'Параметры не заполнены') descParts.push('<div class="item-desc-block"><b>Створка 2:</b> ' + escapeHtml(item.sideTwo) + '</div>');
        if (item.dopOptionsStr) descParts.push('<div class="item-desc-block"><b>Доп.:</b> ' + escapeHtml(item.dopOptionsStr) + '</div>');

        return (
            '<tr data-id="' + item.id + '">' +
                '<td class="col-num">' + (idx + 1) + '</td>' +
                '<td>' +
                    '<div class="item-name">' + (item.name || 'Дверь') + '</div>' +
                    '<div class="item-desc">' + descParts.join('') + '</div>' +
                '</td>' +
                '<td class="col-price">' + formatRub(pricePerOne) + '</td>' +
                '<td class="col-count">' +
                    '<input type="number" class="cnt-input" min="1" value="' + qty + '" data-id="' + item.id + '" data-field="count" />' +
                '</td>' +
                '<td class="col-disc">' +
                    '<span class="discount-wrap"><input type="number" class="disc-input" min="0" max="100" value="' + disc + '" data-id="' + item.id + '" data-field="discount" /></span>' +
                '</td>' +
                '<td class="col-sum"><b>' + formatRub(sumLine) + '</b></td>' +
                '<td class="col-actions">' +
                    '<button type="button" class="icon-btn" title="Дублировать" onclick="duplicateItem(\'' + item.id + '\')">📋</button>' +
                    '<button type="button" class="icon-btn danger" title="Удалить" onclick="removeItem(\'' + item.id + '\')">🗑</button>' +
                '</td>' +
            '</tr>'
        );
    });

    tbody.innerHTML = rows.join('');

    // Слушатели на инпуты в строках
    tbody.querySelectorAll('input[data-field]').forEach(function(inp) {
        inp.addEventListener('input', function() {
            updateItemField(this.dataset.id, this.dataset.field, this.value);
        });
    });

    recalc();
}

function escapeHtml(s) {
    return String(s||'').replace(/[&<>"']/g, function(c) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
}

function updateItemField(id, field, value) {
    var cart = loadCart();
    var it = cart.find(function(x){return x.id === id;});
    if (!it) return;
    var v = parseFloat(value) || 0;
    if (field === 'count') v = Math.max(1, Math.round(v));
    if (field === 'discount') v = Math.max(0, Math.min(100, v));
    it[field] = v;
    saveCart(cart);
    recalc();
    // обновляем сумму строки
    var row = document.querySelector('tr[data-id="' + id + '"]');
    if (row) {
        var sumCell = row.querySelector('.col-sum b');
        if (sumCell) {
            var newSum = Math.round((it.totalPrice||0) * (it.count||1) * (100 - (it.discount||0)) / 100);
            sumCell.textContent = formatRub(newSum);
        }
    }
}

function removeItem(id) {
    if (!confirm('Удалить эту дверь из заказа?')) return;
    var cart = loadCart().filter(function(x){return x.id !== id;});
    saveCart(cart);
    renderItems();
    showToast('Дверь удалена');
}

function duplicateItem(id) {
    var cart = loadCart();
    var it = cart.find(function(x){return x.id === id;});
    if (!it) return;
    var copy = JSON.parse(JSON.stringify(it));
    copy.id = 'door_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    cart.push(copy);
    saveCart(cart);
    renderItems();
    showToast('Дверь скопирована');
}

// ========== Расчёт итогов ==========
function recalc() {
    var cart = loadCart();
    var subTotal = 0;
    cart.forEach(function(it){
        var line = (it.totalPrice||0) * (it.count||1) * (100 - (it.discount||0)) / 100;
        subTotal += line;
    });

    var orderDisc = parseFloat(document.getElementById('orderDiscount').value) || 0;
    orderDisc = Math.max(0, Math.min(100, orderDisc));
    var afterDisc = subTotal * (100 - orderDisc) / 100;
    var discValue = subTotal - afterDisc;

    var ndsOn = document.getElementById('ndsToggle').checked;
    var ndsValue = 0;
    var grand = afterDisc;
    if (ndsOn) {
        ndsValue = afterDisc * 0.22;
        // НДС считаем "сверху" — итог без НДС, плюс НДС
        // если хочешь "в составе" — поменяй формулу
        grand = afterDisc + ndsValue;
    }

    document.getElementById('subTotal').textContent = formatRub(subTotal);
    document.getElementById('discountValue').textContent = '−' + formatRub(discValue);
    document.getElementById('ndsRow').style.display = ndsOn ? 'flex' : 'none';
    document.getElementById('ndsValue').textContent = formatRub(ndsValue);
    document.getElementById('grandTotal').textContent = formatRub(grand);
}

// ========== Действия ==========
function addNewDoor() {
    saveOrderMeta(); // сохранить шапку перед уходом
    window.location.href = 'doors_calc.html?mode=cart';
}

function addNewPartition() {
    saveOrderMeta();
    // Калькулятор перегородок живёт в index.html, открываем сразу на разделе "Итог КП"
    window.location.href = 'index.html?mode=cart#res';
}

function saveOrderMeta() {
    saveMeta({
        contact: document.getElementById('contact').value,
        organization: document.getElementById('organization').value,
        srok: document.getElementById('srok').value,
        shipDate: document.getElementById('shipDate').value,
        note: document.getElementById('note').value,
        prodNote: document.getElementById('prodNote').value,
        comment: document.getElementById('comment').value,
        orderDiscount: document.getElementById('orderDiscount').value,
        ndsOn: document.getElementById('ndsToggle').checked
    });
}

function loadOrderMeta() {
    var m = loadMeta();
    if (!m) return;
    if (m.contact) document.getElementById('contact').value = m.contact;
    if (m.organization) document.getElementById('organization').value = m.organization;
    if (m.srok) document.getElementById('srok').value = m.srok;
    if (m.shipDate) document.getElementById('shipDate').value = m.shipDate;
    if (m.note) document.getElementById('note').value = m.note;
    if (m.prodNote) document.getElementById('prodNote').value = m.prodNote;
    if (m.comment) document.getElementById('comment').value = m.comment;
    if (m.orderDiscount) document.getElementById('orderDiscount').value = m.orderDiscount;
    if (m.ndsOn) document.getElementById('ndsToggle').checked = true;
}

function saveOrder() {
    saveOrderMeta();
    showToast('✓ Заказ сохранён', '#2e7d32');
}

function clearOrder() {
    if (!confirm('Очистить весь заказ? Все добавленные двери будут удалены.')) return;
    sessionStorage.removeItem(STORE_KEY);
    sessionStorage.removeItem(META_KEY);
    document.getElementById('contact').value = '';
    document.getElementById('organization').value = '';
    document.getElementById('srok').value = '5';
    document.getElementById('shipDate').value = '';
    document.getElementById('note').value = '';
    document.getElementById('prodNote').value = '';
    document.getElementById('comment').value = '';
    document.getElementById('orderDiscount').value = '0';
    document.getElementById('ndsToggle').checked = false;
    renderItems();
    showToast('Заказ очищен');
}

function closeOrder() {
    if (loadCart().length > 0) {
        if (!confirm('Закрыть страницу? Несохранённые данные могут быть потеряны.')) return;
    }
    // Куда возвращаться — на страницу КП ERP. Подкорректируй URL под свою систему.
    window.history.length > 1 ? window.history.back() : (window.location.href = 'index.html');
}

function sendToErp() {
    var cart = loadCart();
    if (cart.length === 0) {
        alert('В заказе нет ни одной двери. Добавьте хотя бы одну.');
        return;
    }
    saveOrderMeta();
    var meta = loadMeta();

    // Финальный объект заказа
    var orderPayload = {
        meta: meta,
        items: cart,
        totals: {
            subTotal: parseFloat(document.getElementById('subTotal').textContent.replace(/\s/g,'').replace('₽','').replace(',','.')) || 0,
            grandTotal: parseFloat(document.getElementById('grandTotal').textContent.replace(/\s/g,'').replace('₽','').replace(',','.')) || 0
        },
        createdAt: new Date().toISOString()
    };

    // === ЗАГЛУШКА: пока показываем JSON ===
    // Когда будет готов API ERP — заменить на fetch():
    // fetch('https://invisible-doors.ru/management/orders/create', {
    //   method:'POST', headers:{'Content-Type':'application/json'},
    //   body: JSON.stringify(orderPayload)
    // }).then(...)

    console.log('Order payload:', orderPayload);
    var json = JSON.stringify(orderPayload, null, 2);

    var w = window.open('', '_blank', 'width=720,height=600');
    if (w) {
        w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Заказ → ERP</title>' +
            '<style>body{font:13px monospace;padding:20px;background:#1e1e1e;color:#d4d4d4;}h2{color:#fff;font-family:Arial;}pre{background:#0d0d0d;padding:14px;border-radius:6px;overflow:auto;}</style>' +
            '</head><body><h2>📦 Данные заказа для отправки в ERP</h2>' +
            '<p style="color:#888;font-family:Arial;">Это превью. Когда будет готов API — данные уйдут POST-запросом автоматически.</p>' +
            '<pre>' + json.replace(/[<>&]/g,function(c){return {"<":"&lt;",">":"&gt;","&":"&amp;"}[c];}) + '</pre>' +
            '</body></html>');
    } else {
        alert('Заказ готов к отправке. Откройте консоль браузера (F12), чтобы увидеть данные.');
    }

    showToast('✓ Заказ подготовлен к отправке', '#1565c0');
}

// ========== Инициализация ==========
window.addEventListener('DOMContentLoaded', function() {
    loadOrderMeta();
    renderItems();

    // Дата заказа в шапке
    var d = new Date();
    var pad = function(n){return n<10?'0'+n:n;};
    document.getElementById('orderTitle').textContent =
        'Заказ от ' + pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear() +
        ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());

    // Слушатели на поля шапки → автосохранение
    ['contact','organization','srok','shipDate','note','prodNote','comment'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', saveOrderMeta);
    });
    document.getElementById('orderDiscount').addEventListener('input', function(){ saveOrderMeta(); recalc(); });
    document.getElementById('ndsToggle').addEventListener('change', function(){ saveOrderMeta(); recalc(); });
});
</script>
